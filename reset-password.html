<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码重置 - 江西云厨</title>
  <script type="module" crossorigin src="https://cdn.skypack.dev/-/esm.sh@v1017.0.0-2H51Z5s4R9G6u4dVw5dU/dist=es2020,mode=imports/optimized/esm.sh"></script>
  <script type="module">
    // 检查是否是密码重置页面并动态加载密码重置组件
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    
    // 动态导入React和相关组件
    import('https://esm.sh/react@19.0.0').then(ReactModule => {
      window.React = ReactModule;
      return import('https://esm.sh/react-dom@19.0.0/client');
    }).then(ReactDOMModule => {
      window.ReactDOM = ReactDOMModule;
      return Promise.all([
        import('https://esm.sh/@lucide-icons/react@0.454.0'),
        import('https://esm.sh/https://esm.sh/lodash@4.17.21')
      ]);
    }).then(([icons, _]) => {
      window.LucideIcons = icons;
      renderPasswordResetPage();
    }).catch(error => {
      console.error('Failed to load dependencies:', error);
      document.body.innerHTML = '<div class="error">页面加载失败，请稍后重试</div>';
    });

    function renderPasswordResetPage() {
      const { createElement, useState } = window.React;
      const { createRoot } = window.ReactDOM;
      const { ShieldCheck, Loader2 } = window.LucideIcons;

      const PasswordResetComponent = () => {
        const [newPassword, setNewPassword] = useState('');
        const [confirmPassword, setConfirmPassword] = useState('');
        const [isLoading, setIsLoading] = useState(false);
        const [message, setMessage] = useState('');
        const [error, setError] = useState('');
        const token = new URLSearchParams(window.location.search).get('token');

        const handleResetPassword = async (e) => {
          e.preventDefault();
          setError('');
          setMessage('');
          
          if (!token) {
            setError('缺少重置令牌，请检查重置链接是否完整');
            return;
          }
          
          if (!newPassword || !confirmPassword) {
            setError('请输入新密码和确认密码');
            return;
          }
          
          if (newPassword !== confirmPassword) {
            setError('两次输入的密码不一致');
            return;
          }
          
          if (newPassword.length < 6) {
            setError('密码长度至少为6位');
            return;
          }
          
          setIsLoading(true);
          
          try {
            // 调用API重置密码
            const response = await fetch('https://zlbemopcgjohrnyyiwvs.supabase.co/functions/v1/users-admin/reset-password', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                token,
                newPassword
              })
            });
            
            const result = await response.json();
            
            if (result.success) {
              setMessage('密码重置成功！请使用新密码登录。');
              setNewPassword('');
              setConfirmPassword('');
            } else {
              setError(result.error || '密码重置失败，请稍后重试');
            }
          } catch (err) {
            console.error('Password reset error:', err);
            setError('密码重置失败，请稍后重试');
          } finally {
            setIsLoading(false);
          }
        };

        return createElement('div', { className: 'min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900/95 via-slate-950/90 to-slate-900/95 p-4' },
          createElement('div', { className: 'w-full max-w-md bg-white/5 backdrop-blur-3xl rounded-[3.5rem] shadow-[0_50px_100px_-20px_rgba(0,0,0,0.8)] border border-white/10 p-10 lg:p-14 animate-in zoom-in-95' },
            createElement('div', { className: 'flex flex-col items-center text-center mb-12' },
              createElement('div', { className: 'w-20 h-20 bg-slate-950 rounded-[2rem] flex items-center justify-center shadow-2xl border border-white/10 mb-8 relative group overflow-hidden' },
                createElement('div', { className: 'absolute inset-0 bg-gradient-to-tr from-[#d4af37]/20 to-transparent animate-pulse' }),
                createElement(ShieldCheck, { size: 32, className: 'text-[#d4af37] relative z-10' })
              ),
              createElement('h1', { className: 'text-4xl font-bold text-white tracking-tighter mb-2' }, '江西云厨'),
              createElement('p', { className: 'text-[10px] font-black text-[#d4af37] tracking-[0.5em] uppercase opacity-70' }, '密码重置')
            ),
            createElement('div', { className: 'space-y-8 animate-in slide-in-from-right' },
              createElement('div', { className: 'p-6 bg-emerald-500/10 rounded-3xl border border-emerald-500/20 flex items-start space-x-4 mb-4' },
                createElement(ShieldCheck, { size: 24, className: 'text-emerald-500 shrink-0' }),
                createElement('div', { className: 'space-y-1 text-left' },
                  createElement('p', { className: 'text-xs font-bold text-emerald-500 uppercase tracking-widest' }, '密码重置'),
                  createElement('p', { className: 'text-[10px] text-slate-400 leading-relaxed' }, '请输入您的新密码')
                )
              ),
              createElement('form', { onSubmit: handleResetPassword, className: 'space-y-6' },
                createElement('div', null,
                  createElement('label', { htmlFor: 'password', className: 'block text-xs font-black text-slate-400 uppercase tracking-widest mb-3' }, '新密码'),
                  createElement('input', {
                    id: 'password',
                    type: 'password',
                    value: newPassword,
                    onChange: (e) => setNewPassword(e.target.value),
                    required: true,
                    className: 'w-full py-5 bg-slate-50 border-2 border-slate-100 rounded-2xl px-6 text-slate-900 placeholder-slate-300 focus:outline-none focus:border-[#d4af37] focus:bg-white transition-all',
                    placeholder: '输入新密码'
                  })
                ),
                createElement('div', null,
                  createElement('label', { htmlFor: 'confirmPassword', className: 'block text-xs font-black text-slate-400 uppercase tracking-widest mb-3' }, '确认密码'),
                  createElement('input', {
                    id: 'confirmPassword',
                    type: 'password',
                    value: confirmPassword,
                    onChange: (e) => setConfirmPassword(e.target.value),
                    required: true,
                    className: 'w-full py-5 bg-slate-50 border-2 border-slate-100 rounded-2xl px-6 text-slate-900 placeholder-slate-300 focus:outline-none focus:border-[#d4af37] focus:bg-white transition-all',
                    placeholder: '再次输入新密码'
                  })
                ),
                createElement('button', {
                  type: 'submit',
                  disabled: isLoading,
                  className: 'w-full py-6 bg-emerald-500 text-white rounded-2xl font-black text-xs uppercase tracking-[0.3em] shadow-2xl hover:scale-105 transition-all flex items-center justify-center space-x-3'
                },
                  isLoading ? createElement(Loader2, { size: 24, className: 'animate-spin' }) :
                    createElement('div', { className: 'flex items-center justify-center space-x-3' },
                      createElement(ShieldCheck, { size: 20 }),
                      createElement('span', null, '重置密码')
                    )
                )
              ),
              message && createElement('div', { className: 'p-4 bg-emerald-500/20 border border-emerald-500/30 rounded-xl text-emerald-100 text-center' }, message),
              error && createElement('div', { className: 'p-4 bg-red-500/20 border border-red-500/30 rounded-xl text-red-100 text-center' }, error)
            ),
            createElement('div', { className: 'mt-12 flex items-center justify-between text-[9px] font-black text-slate-600 uppercase tracking-widest px-2' },
              createElement('div', { className: 'flex items-center space-x-2' },
                createElement(ShieldCheck, { size: 12, className: 'text-[#d4af37]' }),
                createElement('span', null, 'SSO安全保护已启用')
              ),
              createElement('div', { className: 'flex items-center space-x-4' },
                createElement('span', { className: 'opacity-40' }, 'JX_CLOUD_PROD_V3')
              )
            )
          )
        );
      };

      const root = createRoot(document.getElementById('root'));
      root.render(createElement(PasswordResetComponent));
    }
  </script>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      overflow-x: hidden;
    }
    .error {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-size: 18px;
      color: #ef4444;
    }
    @keyframes zoom-in-95 {
      0% { transform: scale(0.95); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes slide-in-from-right {
      0% { transform: translateX(100%); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    .animate-in {
      animation: zoom-in-95 0.3s ease-out, slide-in-from-right 0.3s ease-out;
    }
    .animate-in.zoom-in-95 {
      animation: zoom-in-95 0.3s ease-out;
    }
    .animate-in.slide-in-from-right {
      animation: slide-in-from-right 0.3s ease-out;
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
